name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted tag: $TAG"
          echo "Extracted version: $VERSION"

      - name: Create source archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          # 使用 git archive 基于 git 索引打包，避免 tar 报 "file changed as we read it"
          # git archive 只包含 git 跟踪的文件，自动排除 .git/target/temp 等
          git archive --format=tar.gz --prefix=calnexus-${VERSION}/ -o "calnexus-${VERSION}.tar.gz" "$TAG"
          git archive --format=zip --prefix=calnexus-${VERSION}/ -o "calnexus-${VERSION}.zip" "$TAG"

      - name: Generate SHA256 checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum "calnexus-${VERSION}.tar.gz" "calnexus-${VERSION}.zip" > "calnexus-${VERSION}-sha256sums.txt"
          echo "Checksums:"
          cat "calnexus-${VERSION}-sha256sums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            calnexus-${{ steps.version.outputs.version }}.tar.gz
            calnexus-${{ steps.version.outputs.version }}.zip
            calnexus-${{ steps.version.outputs.version }}-sha256sums.txt
