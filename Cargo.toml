[package]
name = "calnexus"
version = "0.1.0"
edition = "2021"
authors = ["Kirky.X"]
license = "MIT"
rust-version = "1.76"
description = "A command-line math expression evaluator with 11 computation domains, symbolic calculus, REPL, and batch processing"
keywords = ["math", "calculator", "symbolic", "repl", "cli"]
categories = ["command-line-utilities", "mathematics", "science"]
repository = "https://github.com/kirky-x/calnexus"
readme = "README.md"

[features]
default = []
cli = ["dep:clap", "dep:rustyline", "dep:rayon"]

[dependencies]
# 解析器
mathexpr = "0.1"
# 缓存层（仅启用 core，禁用默认的 tokio/moka 全特性）
oxcache = { version = "0.2", features = ["core"], default-features = false }
# 哈希（仅启用 std，禁用默认的 rayon/neon 等并行后端）
blake3 = { version = "1", default-features = false, features = ["std"] }
# 序列化（仅 std + derive，禁用默认的 unstable 特性）
serde = { version = "1", default-features = false, features = ["std", "derive"] }
# tokio 运行时（仅 rt，禁用默认的 full）
tokio = { version = "1", default-features = false, features = ["rt"] }
# 正则表达式（仅 std + unicode-perl，禁用默认的 perf-cache/perf-inline 等）
regex = { version = "1", default-features = false, features = ["std", "unicode-perl"] }
# 数值计算（均禁用默认特性，仅启用 std + serde）
num-complex = { version = "0.4", default-features = false, features = ["std", "serde"] }
nalgebra = { version = "0.33", default-features = false, features = ["std"] }
num-bigint = { version = "0.4", default-features = false, features = ["std", "serde"] }
num-rational = { version = "0.4", default-features = false, features = ["std", "serde", "num-bigint"] }
num-integer = { version = "0.1", default-features = false, features = ["std"] }
num-traits = { version = "0.2", default-features = false, features = ["std"] }
# CLI 依赖（仅启用必要特性，禁用默认的 color/env 等）
clap = { version = "4", default-features = false, features = ["std", "derive", "help", "usage", "error-context", "suggestions"], optional = true }
rustyline = { version = "14", default-features = false, features = ["derive"], optional = true }
rayon = { version = "1", optional = true }

[dev-dependencies]
proptest = { version = "1", default-features = false, features = ["std"] }
assert_cmd = "2"
predicates = "3"
tempfile = "3"
serde_json = { version = "1", default-features = false, features = ["std"] }
insta = { version = "1", default-features = false }
criterion = { version = "0.5", default-features = false, features = ["plotters"] }
expectrl = "0.8"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)'] }

[package.metadata.tarpaulin]
fail-under = 90
exclude-files = ["src/main.rs"]

[[bench]]
name = "parser_bench"
harness = false

[[bench]]
name = "cache_bench"
harness = false

[[bench]]
name = "domain_bench"
harness = false
