[package]
name = "calnexus"
version = "1.1.0"
edition = "2021"
authors = ["Kirky.X"]
license = "MIT"
rust-version = "1.76"
description = "A command-line math expression evaluator with 11 computation domains, symbolic calculus, REPL, and batch processing"
keywords = ["math", "calculator", "symbolic", "repl", "cli"]
categories = ["command-line-utilities", "mathematics", "science"]
repository = "https://github.com/kirky-x/calnexus"
readme = "README.md"

[features]
cli = ["dep:clap", "dep:rustyline", "dep:rayon"]

[dependencies]
mathexpr = "0.1"
oxcache = { version = "0.2", features = ["core"], default-features = false }
blake3 = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["rt"] }
regex = "1"
num-complex = "0.4"
nalgebra = "0.33"
num-bigint = { version = "0.4", features = ["serde"] }
num-rational = { version = "0.4", features = ["serde"] }
num-integer = "0.1"
num-traits = "0.2"
clap = { version = "4", features = ["derive"], optional = true }
rustyline = { version = "14", features = ["derive"], optional = true }
rayon = { version = "1", optional = true }

[dev-dependencies]
proptest = "1"
assert_cmd = "2"
predicates = "3"
tempfile = "3"
serde_json = "1"
insta = "1"
criterion = "0.5"
expectrl = "0.8"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)'] }

[package.metadata.tarpaulin]
fail-under = 90
exclude-files = ["src/main.rs"]

[[bench]]
name = "parser_bench"
harness = false

[[bench]]
name = "cache_bench"
harness = false

[[bench]]
name = "domain_bench"
harness = false
